name: Rust CI

on:
  workflow_call:
    inputs:
      rust-toolchain:
        description: Rust toolchain to install for all checks.
        required: false
        type: string
        default: stable
      working-directory:
        description: Directory where cargo commands should run.
        required: false
        type: string
        default: .
      setup-command:
        description: Optional setup command to run after Rust installation and before cargo commands.
        required: false
        type: string
        default: ""
      test-command:
        description: Rust test command to run on every selected platform.
        required: false
        type: string
        default: cargo test
      fmt-command:
        description: Formatting command for the Ubuntu quality gate. Empty disables it.
        required: false
        type: string
        default: cargo fmt --check
      clippy-command:
        description: Clippy command for the Ubuntu quality gate. Empty disables it.
        required: false
        type: string
        default: cargo clippy --all-targets --all-features -- -D warnings
      doc-command:
        description: Documentation command for the Ubuntu quality gate. Empty disables it.
        required: false
        type: string
        default: cargo doc --no-deps

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  platforms:
    name: Platforms
    # Push/PR runs use the shared high-signal platform subset. Scheduled/manual
    # runs expand to the full matrix, matching shell CI's event policy.
    uses: cgraf78/actions/.github/workflows/_rust-platforms.yml@main # zizmor: ignore[unpinned-uses]
    with:
      matrix-set: ${{ (github.event_name == 'push' || github.event_name == 'pull_request') && 'core' || 'full' }}
      rust-toolchain: ${{ inputs.rust-toolchain }}
      working-directory: ${{ inputs.working-directory }}
      setup-command: ${{ inputs.setup-command }}
      test-command: ${{ inputs.test-command }}

  quality:
    name: Quality / Ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$(pwd)"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          components: clippy, rustfmt

      - name: Run repo setup
        if: inputs.setup-command != ''
        shell: bash
        env:
          MATRIX_NAME: Ubuntu
          SETUP_COMMAND: ${{ inputs.setup-command }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        # Run the same optional caller setup before quality commands so repos
        # with generated code or system prerequisites do not need a custom fork.
        run: |
          cd "$WORKING_DIRECTORY"
          eval "$SETUP_COMMAND"

      - name: Check formatting
        if: inputs.fmt-command != ''
        shell: bash
        env:
          FMT_COMMAND: ${{ inputs.fmt-command }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: |
          cd "$WORKING_DIRECTORY"
          eval "$FMT_COMMAND"

      - name: Lint
        if: inputs.clippy-command != ''
        shell: bash
        env:
          CLIPPY_COMMAND: ${{ inputs.clippy-command }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: |
          cd "$WORKING_DIRECTORY"
          eval "$CLIPPY_COMMAND"

      - name: Check public docs
        if: inputs.doc-command != ''
        shell: bash
        env:
          DOC_COMMAND: ${{ inputs.doc-command }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: |-
          cd "$WORKING_DIRECTORY"
          eval "$DOC_COMMAND"
