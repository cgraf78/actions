name: Rust CI

on:
  workflow_call:
    inputs:
      rust-toolchain:
        description: Rust toolchain to install for all checks.
        required: false
        type: string
        default: stable
      test-command:
        description: Rust test command to run on every selected platform.
        required: false
        type: string
        default: cargo test
      fmt-command:
        description: Formatting command for the Ubuntu quality gate. Empty disables it.
        required: false
        type: string
        default: cargo fmt --check
      clippy-command:
        description: Clippy command for the Ubuntu quality gate. Empty disables it.
        required: false
        type: string
        default: cargo clippy --all-targets --all-features -- -D warnings
      doc-command:
        description: Documentation command for the Ubuntu quality gate. Empty disables it.
        required: false
        type: string
        default: RUSTDOCFLAGS='-D missing-docs' cargo doc --no-deps

permissions:
  contents: read

jobs:
  platforms:
    name: Platforms
    # Push/PR runs use the shared high-signal platform subset. Scheduled/manual
    # runs expand to the full matrix, matching shell CI's event policy.
    uses: cgraf78/actions/.github/workflows/_rust-platforms.yml@main # zizmor: ignore[unpinned-uses]
    with:
      matrix-set: ${{ (github.event_name == 'push' || github.event_name == 'pull_request') && 'core' || 'full' }}
      rust-toolchain: ${{ inputs.rust-toolchain }}
      test-command: ${{ inputs.test-command }}

  quality:
    name: Quality / Ubuntu
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$(pwd)"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          components: clippy, rustfmt

      - name: Check formatting
        if: inputs.fmt-command != ''
        shell: bash
        env:
          FMT_COMMAND: ${{ inputs.fmt-command }}
        run: eval "$FMT_COMMAND"

      - name: Lint
        if: inputs.clippy-command != ''
        shell: bash
        env:
          CLIPPY_COMMAND: ${{ inputs.clippy-command }}
        run: eval "$CLIPPY_COMMAND"

      - name: Check public docs
        if: inputs.doc-command != ''
        shell: bash
        env:
          DOC_COMMAND: ${{ inputs.doc-command }}
        run: eval "$DOC_COMMAND"
