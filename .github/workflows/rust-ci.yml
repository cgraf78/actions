name: Rust CI

on:
  workflow_call:
    inputs:
      rust-toolchain:
        description: Rust toolchain to install for all checks.
        required: false
        type: string
        default: stable
      matrix-set:
        description: Platform matrix to run. Supported values are auto, core, and full.
        required: false
        type: string
        default: auto
      working-directory:
        description: Directory where cargo commands should run.
        required: false
        type: string
        default: .
      setup-command:
        description: Optional setup command to run after Rust installation and before cargo commands.
        required: false
        type: string
        default: ""
      test-command:
        description: Rust test command to run on every selected platform.
        required: false
        type: string
        default: cargo test --locked
      fmt-command:
        description: Formatting command for the Ubuntu quality gate. Empty disables it.
        required: false
        type: string
        default: cargo fmt --check
      clippy-command:
        description: Clippy command for the Ubuntu quality gate. Empty disables it.
        required: false
        type: string
        default: cargo clippy --locked --all-targets --all-features -- -D warnings
      build-command:
        description: Build command for the Ubuntu quality gate. Empty disables it.
        required: false
        type: string
        default: cargo build --release --locked
      doc-command:
        description: Documentation command for the Ubuntu quality gate. Empty disables it.
        required: false
        type: string
        default: cargo doc --locked --no-deps
      package-smoke-setup-command:
        description: Optional setup command to run before package-smoke-command on the Ubuntu quality gate.
        required: false
        type: string
        default: ""
      package-smoke-command:
        description: Optional command that builds and validates a representative release artifact on the Ubuntu quality gate.
        required: false
        type: string
        default: ""
    secrets:
      DEPENDENCY_GH_TOKEN:
        description: Optional GitHub token exposed to caller commands as GH_TOKEN and GITHUB_TOKEN for private dependency downloads or rate-limit avoidance.
        required: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  platforms:
    name: Platforms
    # Push/PR runs use the shared high-signal platform subset. Scheduled/manual
    # runs expand to the full matrix, matching shell CI's event policy.
    uses: cgraf78/actions/.github/workflows/_rust-platforms.yml@main # zizmor: ignore[unpinned-uses]
    secrets:
      DEPENDENCY_GH_TOKEN: ${{ secrets.DEPENDENCY_GH_TOKEN }}
    with:
      matrix-set: ${{ inputs.matrix-set != 'auto' && inputs.matrix-set || ((github.event_name == 'push' || github.event_name == 'pull_request') && 'core' || 'full') }}
      rust-toolchain: ${{ inputs.rust-toolchain }}
      working-directory: ${{ inputs.working-directory }}
      setup-command: ${{ inputs.setup-command }}
      test-command: ${{ inputs.test-command }}

  quality:
    name: Quality / Ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$(pwd)"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ inputs.rust-toolchain }}
          components: clippy, rustfmt

      - name: Run repo setup
        if: inputs.setup-command != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DEPENDENCY_GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.DEPENDENCY_GH_TOKEN }}
          MATRIX_NAME: Ubuntu
          SETUP_COMMAND: ${{ inputs.setup-command }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        # Run the same optional caller setup before quality commands so repos
        # with generated code or system prerequisites do not need a custom fork.
        run: |
          cd "$WORKING_DIRECTORY"
          eval "$SETUP_COMMAND"

      - name: Check formatting
        if: inputs.fmt-command != ''
        shell: bash
        env:
          FMT_COMMAND: ${{ inputs.fmt-command }}
          GH_TOKEN: ${{ secrets.DEPENDENCY_GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.DEPENDENCY_GH_TOKEN }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: |
          cd "$WORKING_DIRECTORY"
          eval "$FMT_COMMAND"

      - name: Lint
        if: inputs.clippy-command != ''
        shell: bash
        env:
          CLIPPY_COMMAND: ${{ inputs.clippy-command }}
          GH_TOKEN: ${{ secrets.DEPENDENCY_GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.DEPENDENCY_GH_TOKEN }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: |
          cd "$WORKING_DIRECTORY"
          eval "$CLIPPY_COMMAND"

      - name: Build release binary
        if: inputs.build-command != ''
        shell: bash
        env:
          BUILD_COMMAND: ${{ inputs.build-command }}
          GH_TOKEN: ${{ secrets.DEPENDENCY_GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.DEPENDENCY_GH_TOKEN }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        # Build is a separate quality gate from tests because binary repos need
        # to prove the optimized artifact compiles even when unit tests use the
        # debug profile. Callers still own the exact cargo invocation.
        run: |
          cd "$WORKING_DIRECTORY"
          eval "$BUILD_COMMAND"

      - name: Prepare package smoke
        if: inputs.package-smoke-command != '' && inputs.package-smoke-setup-command != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DEPENDENCY_GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.DEPENDENCY_GH_TOKEN }}
          PACKAGE_SMOKE_SETUP_COMMAND: ${{ inputs.package-smoke-setup-command }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        # Keep package-specific prerequisites caller-owned. The shared workflow
        # provides a stable execution point but does not know whether a repo
        # needs musl tools, signing tools, fixture data, or nothing at all.
        run: |
          cd "$WORKING_DIRECTORY"
          eval "$PACKAGE_SMOKE_SETUP_COMMAND"

      - name: Smoke release package
        if: inputs.package-smoke-command != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DEPENDENCY_GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.DEPENDENCY_GH_TOKEN }}
          PACKAGE_SMOKE_COMMAND: ${{ inputs.package-smoke-command }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        # This is deliberately a command hook rather than a shared packager.
        # Archive layout, binary names, metadata, signatures, and install smoke
        # behavior are product contracts owned by the caller repository.
        run: |
          cd "$WORKING_DIRECTORY"
          eval "$PACKAGE_SMOKE_COMMAND"

      - name: Check public docs
        if: inputs.doc-command != ''
        shell: bash
        env:
          DOC_COMMAND: ${{ inputs.doc-command }}
          GH_TOKEN: ${{ secrets.DEPENDENCY_GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.DEPENDENCY_GH_TOKEN }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: |-
          cd "$WORKING_DIRECTORY"
          eval "$DOC_COMMAND"
