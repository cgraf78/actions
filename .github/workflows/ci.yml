name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality / Ubuntu
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install actionlint
        shell: bash
        env:
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
          ACTIONLINT_VERSION: 1.7.12
        run: |
          archive="$RUNNER_TEMP/actionlint.tar.gz"
          install_dir="$RUNNER_TEMP/actionlint"
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"

          mkdir -p "$install_dir"
          curl -fsSL "$url" -o "$archive"
          echo "${ACTIONLINT_SHA256}  ${archive}" | sha256sum -c -
          tar -xzf "$archive" -C "$install_dir" actionlint
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Install zizmor
        shell: bash
        env:
          ZIZMOR_VERSION: 1.24.1
        run: |
          venv="$RUNNER_TEMP/zizmor"
          python3 -m venv "$venv"
          "$venv/bin/python" -m pip install --upgrade pip
          "$venv/bin/python" -m pip install "zizmor==${ZIZMOR_VERSION}"
          echo "$venv/bin" >> "$GITHUB_PATH"

      - name: Install shellcheck
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint workflows
        shell: bash
        run: actionlint .github/workflows/*.yml

      - name: Audit workflows
        shell: bash
        run: zizmor --offline .github/workflows/*.yml

      - name: Lint shell helper scripts
        shell: bash
        run: |-
          mapfile -t scripts < <(git ls-files .github/actions | awk '/[.]sh$/ { print }')
          if ((${#scripts[@]} == 0)); then
            echo "No shell helper scripts found."
            exit 0
          fi
          # install.sh sources sibling modules through SCRIPT_DIR; the source
          # path keeps ShellCheck's cross-file analysis working from repo root.
          shellcheck -x -P .github/actions/shell-ci-prereqs "${scripts[@]}"
